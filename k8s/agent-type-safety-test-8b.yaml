---
# Variant vs JSON: Agent 类型安全验证 (小表快速版)
# 使用 S3TablesCatalog 创建 Variant 表, 100万+10万行快速验证
#
# 用法:
#   kubectl delete sparkapplication.sparkoperator.k8s.io agent-type-safety-8b -n emr-eks-spark --ignore-not-found
#   kubectl apply -f agent-type-safety-test-8b.yaml -n emr-eks-spark
apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: agent-type-safety-8b
  namespace: emr-eks-spark
spec:
  type: Java
  mode: cluster
  image: 812046859005.dkr.ecr.us-east-1.amazonaws.com/oss-spark:4.1.2-iceberg1.11-s3t
  imagePullPolicy: Always
  mainApplicationFile: s3a://adap-prototype-812046859005/variant-shredding-test/jars/shredding-etl-1.0.0-shaded.jar
  mainClass: com.example.AgentSchemaTest
  sparkVersion: "4.1.2"
  restartPolicy:
    type: Never

  hadoopConf:
    fs.s3.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    fs.s3a.endpoint.region: us-east-1
    fs.s3a.path.style.access: "false"
    fs.AbstractFileSystem.s3.impl: org.apache.hadoop.fs.s3a.S3A

  sparkConf:
    # ── 清除 EMR Operator 注入 ──
    spark.driver.extraClassPath: ""
    spark.executor.extraClassPath: ""
    spark.executor.extraLibraryPath: ""
    spark.driver.extraLibraryPath: ""
    spark.sql.emr.internal.extensions: ""
    spark.hadoop.mapreduce.output.fs.optimized.committer.enabled: "false"
    spark.sql.parquet.fs.optimized.committer.optimization-enabled: "false"
    spark.executor.defaultJavaOptions: "-XX:OnOutOfMemoryError='kill -9 %p'"
    spark.driver.defaultJavaOptions: "-XX:OnOutOfMemoryError='kill -9 %p'"

    # ── Iceberg Extension ──
    spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"

    # ── S3 Tables Catalog (可创建 Variant 表) ──
    "spark.jars.packages": "software.amazon.s3tables:s3-tables-catalog-for-iceberg-runtime:0.1.8"
    spark.sql.catalog.s3t: "org.apache.iceberg.spark.SparkCatalog"
    spark.sql.catalog.s3t.catalog-impl: "software.amazon.s3tables.iceberg.S3TablesCatalog"
    spark.sql.catalog.s3t.warehouse: "arn:aws:s3tables:us-east-1:812046859005:bucket/iceberg-data-812046859005"

    # ── VARIANT Shredding ──
    spark.sql.parquet.variantShreddingEnabled: "true"

    # ── 性能 ──
    spark.sql.adaptive.enabled: "true"
    spark.sql.adaptive.coalescePartitions.enabled: "true"

    # ── 事件日志 ──
    spark.eventLog.enabled: "true"
    spark.eventLog.dir: "s3a://adap-prototype-812046859005/spark-history-logs/"

    # ── EKS 节点选择 ──
    "spark.kubernetes.node.selector.workload-type": "spark-benchmark"
    "spark.kubernetes.node.selector.kubernetes.io/arch": "amd64"

  volumes:
  - name: empty-spark-conf
    emptyDir: {}

  driver:
    cores: 2
    coreLimit: "2.1"
    memory: "4g"
    memoryOverhead: "1024"
    serviceAccount: emr-job-execution-sa
    volumeMounts:
    - name: empty-spark-conf
      mountPath: /usr/lib/spark/conf

  executor:
    cores: 4
    coreLimit: "4.1"
    memory: "8g"
    memoryOverhead: "2048"
    instances: 5
    serviceAccount: emr-job-execution-sa
    volumeMounts:
    - name: empty-spark-conf
      mountPath: /usr/lib/spark/conf
