---
# Kafka Structured Streaming → S3 Tables (VARIANT + Shredding)
# 消费 MSK topic agent.spans → 写入 s3tablesbucket.tracelog.agent_spans
apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: agent-spans-kafka-streaming
  namespace: emr-eks-spark
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "812046859005.dkr.ecr.us-east-1.amazonaws.com/oss-spark:4.1.2-iceberg1.11-s3t-kafka"
  imagePullPolicy: Always
  mainApplicationFile: "s3a://adap-prototype-812046859005/variant-shredding-test/scripts/kafka_streaming_to_iceberg.py"
  sparkVersion: "4.1.2"
  arguments:
    - "--namespace"
    - "tracelog"
    - "--starting-offsets"
    - "earliest"
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 30
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20

  hadoopConf:
    fs.s3.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    fs.s3a.impl: org.apache.hadoop.fs.s3a.S3AFileSystem
    fs.s3a.endpoint.region: us-east-1
    fs.s3a.path.style.access: "false"
    fs.AbstractFileSystem.s3.impl: org.apache.hadoop.fs.s3a.S3A

  sparkConf:
    # ── 清除 EMR Operator 注入的有害配置 ──
    spark.driver.extraClassPath: ""
    spark.executor.extraClassPath: ""
    spark.executor.extraLibraryPath: ""
    spark.driver.extraLibraryPath: ""
    spark.sql.emr.internal.extensions: ""
    spark.hadoop.mapreduce.output.fs.optimized.committer.enabled: "false"
    spark.sql.parquet.fs.optimized.committer.optimization-enabled: "false"
    spark.executor.defaultJavaOptions: "-XX:OnOutOfMemoryError='kill -9 %p'"
    spark.driver.defaultJavaOptions: "-XX:OnOutOfMemoryError='kill -9 %p'"
    spark.eventLog.enabled: "false"

    # ── Iceberg Extension ──
    spark.sql.extensions: "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"

    # ── S3 Tables Catalog（使用 S3TablesCatalog 实现，支持 DDL 建表）──
    spark.sql.catalog.s3tablesbucket: "org.apache.iceberg.spark.SparkCatalog"
    spark.sql.catalog.s3tablesbucket.catalog-impl: "software.amazon.s3tables.iceberg.S3TablesCatalog"
    spark.sql.catalog.s3tablesbucket.warehouse: "arn:aws:s3tables:us-east-1:812046859005:bucket/iceberg-data-812046859005"
    spark.sql.catalog.s3tablesbucket.client.region: "us-east-1"
    spark.sql.defaultCatalog: "s3tablesbucket"

    # ── VARIANT Shredding ──
    spark.sql.parquet.variantShreddingEnabled: "true"
    spark.sql.parquet.enableNestedColumnVectorizedReader: "true"

    # ── 性能 ──
    spark.sql.adaptive.enabled: "true"
    spark.sql.adaptive.coalescePartitions.enabled: "true"
    spark.sql.shuffle.partitions: "200"
    spark.default.parallelism: "200"

    # ── Streaming 配置 ──
    spark.sql.streaming.checkpointLocation: "s3a://adap-prototype-812046859005/variant-shredding-test/checkpoints/kafka-streaming-v2/"
    spark.streaming.stopGracefullyOnShutdown: "true"

    # ── EKS 节点选择 ──
    "spark.kubernetes.node.selector.workload-type": "spark-benchmark"
    "spark.kubernetes.node.selector.kubernetes.io/arch": "amd64"

  volumes:
  - name: empty-spark-conf
    emptyDir: {}

  driver:
    cores: 2
    coreLimit: "2000m"
    memory: "4g"
    serviceAccount: emr-job-execution-sa
    labels:
      version: "4.1.2"
    volumeMounts:
    - name: empty-spark-conf
      mountPath: /usr/lib/spark/conf

  executor:
    cores: 4
    coreLimit: "4000m"
    memory: "8g"
    instances: 3
    labels:
      version: "4.1.2"
    volumeMounts:
    - name: empty-spark-conf
      mountPath: /usr/lib/spark/conf
